<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada | Bendicta Cerveja</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', -apple-system, sans-serif;
            background: #0A0B10;
            color: #F0EDE6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        .logo {
            font-family: Georgia, serif;
            font-size: 2rem;
            font-weight: 700;
            color: #B28F3E;
            letter-spacing: 0.2em;
            margin-bottom: 0.25rem;
        }
        .logo-sub {
            font-size: 0.55rem;
            font-weight: 600;
            color: #B28F3E;
            letter-spacing: 0.5em;
            opacity: 0.7;
            margin-bottom: 3rem;
        }
        .code {
            font-size: 6rem;
            font-weight: 800;
            color: rgba(178, 143, 62, 0.15);
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        p {
            font-size: 0.9rem;
            color: rgba(240, 237, 230, 0.6);
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, #8A6D2F, #B28F3E, #DAB962);
            color: #0A0B10;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(178, 143, 62, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">BENDICTA</div>
        <div class="logo-sub">CERVEJA</div>
        <div class="code">404</div>
        <h1>Página não encontrada</h1>
        <p>A página que você procura não existe ou foi movida. Volte para a página inicial e conheça a Bendicta.</p>
        <a href="/" class="btn">Voltar ao Início</a>
    </div>
</body>
</html>
